<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password &mdash; Nexus Games</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <h1>Forgot Password</h1>
            <p class="subtitle">Enter your email to receive a reset link.</p>
            <form id="forgot-form" novalidate>
                <input class="form-input" type="email" id="email" placeholder="Email Address" required autocomplete="email">
                <button type="submit" class="btn-add btn-block">Send Reset Link</button>
                <div id="message" class="message" role="status" aria-live="polite"></div>
            </form>
            <hr class="form-divider">
            <p style="color: var(--muted);"><a href="/login">Back to Login</a></p>
            <p style="color: var(--muted); margin-top: 10px; font-size: 0.85rem;">
                <strong>Demo note:</strong> the reset link is printed to the server console
                (look for <code>[PASSWORD RESET LINK]</code>).
            </p>
        </div>
    </div>

    <script>window.NEXUS_CSRF = "{{ csrf_token }}";</script>
    <script src="/static/main.js"></script>
    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const msg = document.getElementById('message');
            msg.className = 'message';
            const { data } = await NEXUS.api('/api/password-reset/request', { method: 'POST', body: { email } });
            msg.textContent = data.message || 'Check your email.';
            msg.classList.add(data.success ? 'success' : 'error');
        });
    </script>
</body>
</html>
