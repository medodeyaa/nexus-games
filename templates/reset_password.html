<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password &mdash; Nexus Games</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="auth-shell">
        <div class="auth-card">
            <h1>Reset Password</h1>
            <p class="subtitle">Choose a new password.</p>
            <form id="reset-form" novalidate>
                <input class="form-input" type="password" id="new_password" placeholder="New Password (8+ chars, letter & number)" required autocomplete="new-password">
                <input class="form-input" type="password" id="confirm_password" placeholder="Confirm Password" required autocomplete="new-password">
                <button type="submit" class="btn-add btn-block">Update Password</button>
                <div id="message" class="message" role="status" aria-live="polite"></div>
            </form>
            <hr class="form-divider">
            <p style="color: var(--muted);"><a href="/login">Back to Login</a></p>
        </div>
    </div>

    <script>window.NEXUS_CSRF = "{{ csrf_token }}";</script>
    <script src="/static/main.js"></script>
    <script>
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = new URLSearchParams(window.location.search).get('token');
            const newPassword = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;
            const msg = document.getElementById('message');
            msg.className = 'message';
            if (!token) {
                msg.textContent = 'Missing reset token.';
                msg.classList.add('error'); return;
            }
            if (newPassword !== confirm) {
                msg.textContent = 'Passwords do not match.';
                msg.classList.add('error'); return;
            }
            const { data } = await NEXUS.api('/api/password-reset/confirm', {
                method: 'POST', body: { token, new_password: newPassword }
            });
            msg.textContent = data.message || (data.success ? 'Password updated.' : 'Reset failed.');
            msg.classList.add(data.success ? 'success' : 'error');
            if (data.success) setTimeout(() => { window.location.href = '/login'; }, 1500);
        });
    </script>
</body>
</html>
